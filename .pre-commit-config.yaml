repos:
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]

      - id: ruff-format

  - repo: https://github.com/pycqa/isort
    rev: 9.0.0b1
    hooks:
      - id: isort