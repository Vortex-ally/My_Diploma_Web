name: Django CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: Django check
        env:
          DJANGO_SETTINGS_MODULE: volunteer.settings.testing
        run: python volunteer/manage.py check

      - name: Migrate
        env:
          DJANGO_SETTINGS_MODULE: volunteer.settings.testing
        run: python volunteer/manage.py migrate

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: volunteer.settings.testing
        run: pytest