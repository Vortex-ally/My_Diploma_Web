[tool.black]
line-length = 88
target-version = ["py313"]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
]

ignore = [
    "E501", # довгі рядки
    "F403", # from .base import *
]

exclude = [
    "*/migrations/*",
]

[tool.ruff.format]

[tool.isort]
profile = "black"
skip_glob = [
    "*/migrations/*",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "volunteer.settings.development"

python_files = [
    "tests.py",
    "test_*.py",
    "*_tests.py",
]